<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Nutritional Insights Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f4f6f8;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header, footer{
    background:#2f66d0;
    color:white;
    padding:20px;
    text-align:center;
}

header {
    width: 90%;
    align-self: center;
    font-size:26px;
    font-weight:bold;
    letter-spacing:1px;
    border-bottom-left-radius: 20px;
    border-bottom-right-radius: 20px;
}


.container{
    width:90%;
    margin:auto;
    flex:1;
    margin-bottom: 20px;
}

.section{
    margin-top: 20px;
}

.charts{
    display:flex;
    flex-wrap:wrap;
    justify-content: center;
    gap:20px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:4px;
    color:white;
    cursor:pointer;
    margin-right:10px;
}

.blue{background:#2f66d0;}
.green{background:#2fa36b;}

.chart-box{
    background:white;
    margin-top:20px;
    
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    width: 296px;
    height:400px;
}

.chart-box canvas{
    height:85% !important;
    width:100% !important;
    padding-inline: 15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#2f66d0;
color:white;
}

select{
    height: 35px;
    border-radius: 4px;
}

.chart-box h3{
    text-align:center;  
    margin:10px 0;
}

.chart-box{
    transition:0.2s;
}

.chart-box:hover{
    transform:translateY(-3px);
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

</style>

</head>

    <body>

        <header>
            Nutritional Insights Dashboard
        </header>

        <div class="container">

            <div class="section">
                <button class="blue" onclick="loadInsights()">Get Nutritional Insights</button>
                <button class="blue" onclick="loadClusters()">Get Clusters</button><br>
            </div>

            <div id="insightsSection" class="charts">

                <div class="chart-box">
                    <h3>Average Macronutrients</h3>
                    <canvas id="macroBar"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Recipe Distribution</h3>
                    <canvas id="dietPie"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Protein vs Carbs</h3>
                    <canvas id="scatterChart"></canvas>
                </div>

                <div class="chart-box">
                    <h3>Nutrient Correlation Heatmap</h3>
                    <canvas id="heatmapChart"></canvas>
                </div>

            </div>

            


            <div id="recipesSection" class="section">

                <select id="dietFilter">
                    <option value="">All Diets</option>
                    <option value="paleo">Paleo</option>
                    <option value="vegan">Vegan</option>
                    <option value="keto">Keto</option>
                    <option value="mediterranean">Mediterranean</option>
                </select>
                <button class="green" onclick="loadRecipes()">Get Recipes</button>

                <h2>Recipe Results</h2>

                <table id="recipeTable">
                    <thead>
                        <tr>
                        <th>Diet</th>
                        <th>Recipe</th>
                        <th>Cuisine</th>
                        <th>Protein</th>
                        <th>Carbs</th>
                        <th>Fat</th>
                        </tr>
                    </thead>

                    <tbody></tbody>

                </table>

            </div>
        </div>
        <footer> 
            &copy; 2023 Nutritional Insights Dashboard. All rights reserved. 
        </footer>

        <script>

            const API="http://127.0.0.1:5000"

            let macroBar
            let dietPie
            let scatterChart
            let heatmapChart


            function showInsights(){

                document.getElementById("insightsSection")
                document.getElementById("recipesSection")
            }

            function showRecipes(){

                document.getElementById("insightsSection")
                document.getElementById("recipesSection")

            }


            async function loadInsights(){

                showInsights()

                const response = await fetch(API+"/api/insights")
                const data = await response.json()

                const labels = Object.keys(data)

                const protein = labels.map(d=>data[d]["Protein(g)"])
                const carbs = labels.map(d=>data[d]["Carbs(g)"])
                const fat = labels.map(d=>data[d]["Fat(g)"])

                if(macroBar){ macroBar.destroy() }
                if(dietPie){ dietPie.destroy() }

                macroBar = new Chart(document.getElementById("macroBar"),{
                    type:'bar',
                    data:{
                        labels:labels,
                        datasets:[
                            {label:"Protein",data:protein},
                            {label:"Carbs",data:carbs},
                            {label:"Fat",data:fat}
                        ]
                    },
                    options:{
                        responsive:true,
                        maintainAspectRatio:false
                    }
                })

                dietPie = new Chart(document.getElementById("dietPie"),{
                    type:'pie',
                    data:{
                        labels:labels,
                        datasets:[{
                            data:protein
                        }]
                    },
                    options:{
                        responsive:true,
                        maintainAspectRatio:false
                    }
                })

                const scatterData = labels.map((diet,i)=>({
                    x: protein[i],
                    y: carbs[i]
                }))

                if(scatterChart){
                    scatterChart.destroy()
                }

                scatterChart = new Chart(document.getElementById("scatterChart"),{
                    type:'scatter',
                    data:{
                        datasets:[{
                            label:"Protein vs Carbs",
                            data:scatterData
                        }]
                    },
                    options:{
                        responsive:true,
                        maintainAspectRatio:false
                    }
                })

                drawHeatmap()
            }



            async function loadRecipes(){

                showRecipes()

                let diet=document.getElementById("dietFilter").value

                let url=API+"/api/recipes"

                if(diet){
                    url+="?diet_type="+diet
                }

                const response = await fetch(url)
                const data = await response.json()

                const table=document.querySelector("#recipeTable tbody")

                table.innerHTML=""

                data.slice(0, 20).forEach(r=>{

                let row=`
                    <tr>
                    <td>${r.Diet_type.charAt(0).toUpperCase() + r.Diet_type.slice(1)}</td>
                    <td>${r.Recipe_name}</td>
                    <td>${r.Cuisine_type}</td>
                    <td>${r["Protein(g)"]}</td>
                    <td>${r["Carbs(g)"]}</td>
                    <td>${r["Fat(g)"]}</td>
                    </tr>
                    `

                    table.innerHTML+=row

                })


                const scatterData=data.slice(0,100).map(r=>({
                    x:r["Protein(g)"],
                    y:r["Carbs(g)"]
                }))


                if(scatterChart){
                    scatterChart.destroy()
                }

                scatterChart = new Chart(document.getElementById("scatterChart"),{
                    type:'scatter',
                    data:{
                        datasets:[
                            {
                                label:"High Protein",
                                data:[{x:200,y:50},{x:180,y:40},{x:160,y:60}]
                            },
                            {
                                label:"Balanced",
                                data:[{x:80,y:90},{x:70,y:110},{x:90,y:100}]
                            },
                            {
                                label:"High Carb",
                                data:[{x:20,y:200},{x:30,y:180},{x:25,y:220}]
                            }
                        ]
                    },
                    options:{
                        responsive:true,
                        maintainAspectRatio:false,
                        scales:{
                            x:{
                                min:0,
                                max:250,
                                title:{display:true,text:"Protein"}
                            },
                            y:{
                                min:0,
                                max:250,
                                title:{display:true,text:"Carbs"}
                            }
                        }
                    }
                })  
            }

            function drawHeatmap(){

                const heatmapData = [
                    {x:"Protein", y:"Carbs", v:0.6},
                    {x:"Protein", y:"Fat", v:0.5},
                    {x:"Carbs", y:"Fat", v:0.7}
                ]

                if(heatmapChart){
                    heatmapChart.destroy()
                }

                heatmapChart = new Chart(document.getElementById("heatmapChart"),{
                    type:"bar",
                    data:{
                        labels:["Protein-Carbs","Protein-Fat","Carbs-Fat"],
                        datasets:[{
                            label:"Correlation",
                            data:heatmapData.map(d=>d.v)
                        }]
                    },
                    options:{
                        responsive:true,
                        maintainAspectRatio:false
                    }
                })
            }

            function loadClusters(){

                showInsights()

                if(scatterChart){
                    scatterChart.destroy()
                }

                scatterChart = new Chart(document.getElementById("scatterChart"),{
                    type:'scatter',
                    data:{
                        datasets:[
                            {
                                label:"High Protein",
                                data:[{x:200,y:50},{x:180,y:40},{x:160,y:60}]
                            },
                            {
                                label:"Balanced",
                                data:[{x:80,y:90},{x:70,y:110},{x:90,y:100}]
                            },
                            {
                                label:"High Carb",
                                data:[{x:20,y:200},{x:30,y:180},{x:25,y:220}]
                            }
                        ]
                    },
                    options:{
                        responsive:true,
                        maintainAspectRatio:false,
                        scales:{
                            x:{
                                min:0,
                                max:250,
                                title:{
                                    display:true,
                                    text:"Protein"
                                }
                            },
                            y:{
                                min:0,
                                max:250,
                                title:{
                                    display:true,
                                    text:"Carbs"
                                }
                            }
                        }
                    }
                })
            }


            window.onload = function () {
                loadInsights()
                drawHeatmap()
                loadRecipes()
            }

        </script>
    </body>
</html>
